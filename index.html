<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>totonouné ｜ 耳ツボセラピー</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#F7F2EA;
    --bg2:#FBF8F2;
    --card:#FFFFFF;
    --ink:#3B352D;
    --ink-soft:#6E665A;
    --muted:#A79C8B;
    --line:#E9E0D2;
    --gold:#C2A268;
    --gold-deep:#A9854B;
    --gold-soft:#F3EAD8;
    --rose:#C58E86;
    --shadow:0 14px 40px -18px rgba(80,60,30,.32);
    --shadow-sm:0 6px 18px -10px rgba(80,60,30,.30);
    --radius:20px;
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"Zen Kaku Gothic New","Hiragino Sans","Yu Gothic",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 50% -10%, #FFFDF8 0%, rgba(255,253,248,0) 60%),
      linear-gradient(180deg,var(--bg2),var(--bg));
    background-attachment:fixed;
    min-height:100vh;
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }
  .mincho{font-family:"Shippori Mincho B1","Hiragino Mincho ProN","Yu Mincho",serif;}

  .shell{max-width:560px;margin:0 auto;padding:0 18px;min-height:100vh;display:flex;flex-direction:column;}

  /* Top bar */
  .topbar{position:sticky;top:0;z-index:30;padding:14px 2px 12px;
    background:linear-gradient(180deg, var(--bg2) 70%, rgba(251,248,242,0));}
  .brandrow{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .brand{font-family:"Shippori Mincho B1",serif;letter-spacing:.14em;font-size:15px;color:var(--ink);display:flex;align-items:center;gap:9px}
  .brand .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 4px var(--gold-soft)}
  .brand small{letter-spacing:.06em;color:var(--muted);font-family:"Zen Kaku Gothic New",sans-serif;font-size:10.5px;font-weight:500}
  .adjust{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--ink-soft);cursor:pointer;user-select:none;
    border:1px solid var(--line);background:#fff;padding:6px 10px;border-radius:999px;transition:.25s}
  .adjust:hover{border-color:var(--gold)}
  .adjust .sw{width:30px;height:17px;border-radius:999px;background:#E4DBCB;position:relative;transition:.25s}
  .adjust .sw::after{content:"";position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:.25s var(--ease)}
  .adjust.on .sw{background:var(--gold)}
  .adjust.on .sw::after{left:15px}
  .swatch{width:13px;height:13px;border-radius:50%;background:var(--gold);box-shadow:inset 0 0 0 1.5px #fff,0 0 0 1px var(--line);transition:.3s}

  /* repeat / my-chart */
  .lastvisit{background:linear-gradient(180deg,#fff,var(--gold-soft));border:1px solid var(--line);border-radius:15px;
    padding:13px 15px;margin-bottom:16px;display:flex;align-items:center;gap:12px;text-align:left;box-shadow:var(--shadow-sm)}
  .lastvisit .lv-ic{flex:none;width:38px;height:38px;border-radius:50%;background:#fff;border:1px solid var(--line);display:grid;place-items:center;color:var(--gold-deep);font-size:18px}
  .lastvisit .lv-t{flex:1;font-size:12.5px;color:var(--ink-soft);line-height:1.5}
  .lastvisit .lv-t b{color:var(--ink);font-family:"Shippori Mincho B1",serif;font-weight:600}
  .reminder{display:flex;align-items:center;justify-content:space-between;gap:12px;background:#FBF7EF;border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-top:12px}
  .reminder .rm-t{font-size:13px;color:var(--ink)}
  .reminder .rm-t small{display:block;color:var(--muted);font-size:11px;margin-top:2px}
  .save-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .save-btn{flex:1;min-width:140px;border:1.5px solid var(--gold);background:#fff;color:var(--gold-deep);border-radius:13px;padding:12px;font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer;transition:.2s}
  .save-btn:hover{background:var(--gold-soft)}
  .save-btn.done{background:var(--gold);color:#fff;border-color:var(--gold)}
  .compare{margin-top:12px;font-size:12.5px;color:var(--ink-soft);background:#fff;border:1px dashed var(--gold);border-radius:12px;padding:11px 13px;line-height:1.6}
  .compare b{color:var(--gold-deep)}

  .progress-wrap{margin-top:11px;display:flex;align-items:center;gap:11px}
  .progress{flex:1;height:5px;border-radius:99px;background:#EBE2D2;overflow:hidden}
  .progress > i{display:block;height:100%;width:0;border-radius:99px;
    background:linear-gradient(90deg,var(--gold),var(--gold-deep));transition:width .55s var(--ease)}
  .stepno{font-size:11px;color:var(--muted);letter-spacing:.05em;font-variant-numeric:tabular-nums;white-space:nowrap}

  /* Stage */
  main{flex:1;display:flex;flex-direction:column;justify-content:flex-start;padding:8px 0 130px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:26px 22px 24px;position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;inset:0 0 auto 0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5}

  .kicker{font-size:11.5px;letter-spacing:.18em;color:var(--gold-deep);font-weight:700;text-transform:uppercase;margin-bottom:9px}
  .q-title{font-family:"Shippori Mincho B1",serif;font-size:21px;line-height:1.55;font-weight:600;letter-spacing:.01em;margin:0 0 6px}
  .q-note{font-size:12.5px;color:var(--ink-soft);background:var(--gold-soft);border-radius:12px;padding:10px 13px;margin:12px 0 4px;line-height:1.6}
  .group-label{font-size:11px;letter-spacing:.14em;color:var(--muted);font-weight:700;margin:20px 0 9px;display:flex;align-items:center;gap:9px}
  .group-label::after{content:"";flex:1;height:1px;background:var(--line)}

  .opts{display:flex;flex-direction:column;gap:9px;margin-top:14px}
  .opts.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .opt{appearance:none;text-align:left;border:1.5px solid var(--line);background:#FFFEFB;border-radius:14px;
    padding:13px 14px;cursor:pointer;transition:.2s var(--ease);display:flex;align-items:flex-start;gap:11px;
    font-family:inherit;color:var(--ink);font-size:14.5px;line-height:1.45;width:100%}
  .opt:hover{border-color:var(--gold);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
  .opt:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .opt .mark{flex:none;width:21px;height:21px;border-radius:50%;border:1.5px solid var(--line);
    display:grid;place-items:center;margin-top:1px;transition:.2s}
  .opt.multi .mark{border-radius:7px}
  .opt .mark svg{width:12px;height:12px;opacity:0;transform:scale(.4);transition:.2s var(--ease)}
  .opt .body{display:flex;flex-direction:column}
  .opt .sub{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.4}
  .opt.sel{border-color:var(--gold);background:linear-gradient(180deg,#FFFDF6,var(--gold-soft));box-shadow:var(--shadow-sm)}
  .opt.sel .mark{background:var(--gold);border-color:var(--gold)}
  .opt.sel .mark svg{opacity:1;transform:scale(1);color:#fff}
  .opt .rankbadge{flex:none;width:21px;height:21px;border-radius:50%;border:1.5px solid var(--line);
    display:grid;place-items:center;margin-top:1px;font-size:12px;font-weight:700;color:var(--muted);transition:.2s}
  .opt.sel .rankbadge{background:var(--gold);border-color:var(--gold);color:#fff}
  .opt.disabled{opacity:.4;pointer-events:none}

  .counter{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--gold-deep);
    background:var(--gold-soft);border-radius:99px;padding:4px 11px;margin-top:14px;font-weight:700;font-variant-numeric:tabular-nums}

  /* Bottom nav */
  .nav{position:fixed;left:0;right:0;bottom:0;z-index:40;
    background:linear-gradient(180deg,rgba(247,242,234,0),var(--bg) 38%);padding:16px 0 max(18px,env(safe-area-inset-bottom))}
  .nav-inner{max-width:560px;margin:0 auto;padding:0 18px;display:flex;gap:12px}
  .btn{flex:1;border:none;border-radius:15px;padding:15px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;
    transition:.2s var(--ease);letter-spacing:.04em}
  .btn-ghost{flex:0 0 116px;background:#fff;border:1.5px solid var(--line);color:var(--ink-soft)}
  .btn-ghost:hover{border-color:var(--gold);color:var(--ink)}
  .btn-primary{background:linear-gradient(180deg,#4A4339,#3B352D);color:#F6EFE1;box-shadow:0 10px 24px -12px rgba(59,53,45,.8)}
  .btn-primary:hover{transform:translateY(-1px)}
  .btn-primary:disabled{background:#E7DECF;color:#B7AC99;cursor:not-allowed;transform:none;box-shadow:none}

  /* Hero */
  .hero{text-align:center;padding:46px 22px 40px}
  .hero .glyph{width:62px;height:62px;margin:0 auto 22px;display:grid;place-items:center;border-radius:50%;
    background:linear-gradient(180deg,#fff,var(--gold-soft));border:1px solid var(--line);box-shadow:var(--shadow-sm)}
  .hero .glyph svg{width:34px;height:34px;color:var(--gold-deep)}
  .hero h1{font-family:"Shippori Mincho B1",serif;font-weight:600;font-size:27px;line-height:1.6;margin:0 0 6px;letter-spacing:.02em}
  .hero .cn{font-family:"Shippori Mincho B1",serif;color:var(--gold-deep);letter-spacing:.3em;font-size:13px;margin-bottom:20px}
  .hero p{color:var(--ink-soft);font-size:14px;max-width:380px;margin:0 auto 8px}
  .hero .steps-mini{display:flex;justify-content:center;gap:7px;margin:26px 0 6px;flex-wrap:wrap}
  .hero .steps-mini span{font-size:11px;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:99px;padding:5px 12px}

  /* transitions */
  .enter{animation:enter .5s var(--ease) both}
  @keyframes enter{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .reveal{opacity:0;transform:translateY(16px);animation:enter .6s var(--ease) forwards}

  /* Result */
  .res-head{text-align:center;padding:8px 6px 4px}
  .res-head .kicker{margin-bottom:8px}
  .res-head h2{font-family:"Shippori Mincho B1",serif;font-size:23px;font-weight:600;margin:0 0 6px;line-height:1.5}
  .res-head p{color:var(--ink-soft);font-size:13px;margin:0}
  .block{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:20px 18px;margin-top:16px}
  .block h3{font-family:"Shippori Mincho B1",serif;font-size:16px;font-weight:600;margin:0 0 4px;display:flex;align-items:center;gap:9px}
  .block h3 .n{flex:none;width:24px;height:24px;border-radius:8px;background:var(--gold-soft);color:var(--gold-deep);display:grid;place-items:center;font-size:12px;font-weight:800;font-family:"Zen Kaku Gothic New",sans-serif}
  .block .lead{font-size:12px;color:var(--muted);margin:0 0 12px}

  .summary{display:grid;grid-template-columns:auto 1fr;gap:9px 14px;font-size:13.5px}
  .summary dt{color:var(--muted);font-size:12px;white-space:nowrap}
  .summary dd{margin:0;color:var(--ink)}

  .emo-flow{display:flex;flex-direction:column;gap:8px}
  .emo-row{display:flex;align-items:center;gap:10px;font-size:13.5px}
  .emo-row .e{flex:1;color:var(--ink-soft)}
  .emo-row .arr{color:var(--gold);font-size:12px}
  .organ-chip{display:inline-grid;place-items:center;min-width:34px;height:34px;border-radius:10px;padding:0 9px;
    font-family:"Shippori Mincho B1",serif;font-size:16px;font-weight:600;color:#fff;
    background:linear-gradient(180deg,var(--gold),var(--gold-deep));box-shadow:var(--shadow-sm)}
  .organ-summary{margin-top:14px;padding:13px 14px;border-radius:13px;background:var(--gold-soft);font-size:13.5px;line-height:1.7;color:var(--ink)}
  .organ-summary b{color:var(--gold-deep)}

  .ears{display:flex;gap:12px;margin-top:6px}
  .ear-col{flex:1;text-align:center}
  .ear-col .ear-name{font-family:"Shippori Mincho B1",serif;font-size:14px;margin-bottom:2px}
  .ear-col .ear-sub{font-size:10.5px;color:var(--muted);margin-bottom:6px;min-height:14px}
  .ear-svg{width:100%;height:auto;display:block}
  .badge-pop{transform-origin:center;animation:pop .45s var(--ease) both}
  @keyframes pop{0%{opacity:0;transform:scale(.2)}70%{transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}

  .legend{margin-top:14px;display:flex;flex-direction:column;gap:7px}
  .legend .li{display:flex;align-items:flex-start;gap:10px;font-size:12.5px;color:var(--ink-soft)}
  .legend .li .b{flex:none;width:20px;height:20px;border-radius:50%;background:linear-gradient(180deg,var(--gold),var(--gold-deep));
    color:#fff;display:grid;place-items:center;font-size:11px;font-weight:700;margin-top:1px}
  .legend .li b{color:var(--ink);font-weight:600}

  .howto li{font-size:13px;color:var(--ink-soft);margin-bottom:9px;line-height:1.65}
  .howto li b{color:var(--ink)}
  .next-list{display:flex;flex-direction:column;gap:8px;margin-top:4px}
  .next-item{display:flex;align-items:center;gap:10px;font-size:13px;background:#FBF7EF;border:1px dashed var(--gold);border-radius:12px;padding:10px 13px}
  .next-item .ic{color:var(--gold-deep);font-size:11px;font-weight:700;background:#fff;border-radius:99px;padding:3px 9px;border:1px solid var(--line)}
  .closing{font-size:13.5px;color:var(--ink-soft);line-height:1.8;text-align:center;padding:6px 4px}
  .disclaimer{font-size:11px;color:var(--muted);text-align:center;margin:22px 6px 0;line-height:1.7}
  footer{padding:14px 0 40px;text-align:center}
  .restart{background:none;border:1px solid var(--line);color:var(--ink-soft);border-radius:99px;padding:11px 22px;font-family:inherit;font-size:13px;cursor:pointer;transition:.2s}
  .restart:hover{border-color:var(--gold);color:var(--ink)}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important;transition-duration:.05ms !important}
  }
  @media (max-width:380px){ .opts.grid{grid-template-columns:1fr} }
</style>
</head>
<body>
<div class="shell">
  <div class="topbar" id="topbar">
    <div class="brandrow">
      <div class="brand"><span class="dot"></span><span id="brandName" class="mincho">totonoué</span>&nbsp;<small id="brandTag">耳ツボセラピー</small></div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="adjust" id="brandSwitch" tabindex="0" title="ホワイトラベル：院ごとにブランドを差し替え（デモ）"><span class="swatch" id="swatch"></span>店舗</div>
        <div class="adjust" id="adjust" role="switch" aria-checked="false" tabindex="0" title="結果の耳マップ上の位置を微調整するモード（デモ）">
          <span class="sw"></span>位置調整
        </div>
      </div>
    </div>
    <div class="progress-wrap" id="progressWrap" style="display:none">
      <div class="progress"><i id="bar"></i></div>
      <div class="stepno" id="stepno">1 / 9</div>
    </div>
  </div>

  <main id="stage"></main>
</div>

<div class="nav" id="nav" style="display:none">
  <div class="nav-inner">
    <button class="btn btn-ghost" id="back">もどる</button>
    <button class="btn btn-primary" id="next">つぎへ</button>
  </div>
</div>

<script>
/* ---------- icons ---------- */
const CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l4.5 4.5L19 7"/></svg>';
const EARGLYPH = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9a6 6 0 1 1 12 0c0 3-2.2 4-3.4 5.2C13.4 15.4 13 16.4 13 18a3 3 0 0 1-5.6 1.5"/><path d="M9.2 9.2a2.8 2.8 0 0 1 5.4 1c0 1.8-1.8 2.4-2.6 3.4"/></svg>';

/* ---------- option pools ---------- */
const BODY_PARTS = ["頭","首肩","腕","肘","手首","指の関節","背中","腰","股関節","お尻・骨盤まわり","太もも","ふくらはぎ","膝","足首","足底","足の指"];
const TROUBLES  = ["むくみ","眼精疲労","だるさ・倦怠感","寝ても疲れがとれない","不安感","冷え","便秘","つい食べすぎてしまう","ホットフラッシュ","花粉症・アレルギー症状"];

/* ---------- ear reflex points (normalized to a 0..200 x, 0..280 y RIGHT-ear viewBox) ---------- */
const PT = {
  "神門":[120,74],"内分泌":[96,196],"皮質下":[104,188],"交感":[140,150],
  "腎":[120,112],"肝":[110,150],"脾":[92,164],"心":[103,150],"肺":[90,150],
  "枕":[80,182],"腹水点":[100,170],"眼":[98,236],"胃":[97,142],"大腸":[84,138],"直腸":[76,150],
  "頸肩":[132,170],"胸椎":[129,140],"腰椎":[126,120],"肩":[140,150],"肘":[148,122],
  "腕指":[152,98],"膝":[136,104],"股関節":[130,114],"足首":[142,76],"足趾":[152,62],
  "頭点":[106,246],"飢点":[78,164],"内鼻":[80,180],"風渓":[138,90],"骨盤":[114,90],"下顎":[114,214]
};

/* complaint -> ordered reflex set */
const COMPLAINT_PT = {
  "むくみ":["腎","脾","内分泌"],
  "眼精疲労":["眼","肝","枕"],
  "だるさ・倦怠感":["脾","枕","腹水点"],
  "寝ても疲れがとれない":["神門","心","腎"],
  "不安感":["神門","心","皮質下"],
  "冷え":["腎","内分泌","交感"],
  "便秘":["大腸","直腸","脾"],
  "つい食べすぎてしまう":["飢点","胃","脾"],
  "ホットフラッシュ":["内分泌","腎","神門"],
  "花粉症・アレルギー症状":["内鼻","肺","風渓"],
  "頭":["頭点","枕","神門"],"首肩":["頸肩","肩","神門"],"腕":["腕指","肩","神門"],
  "肘":["肘","腕指","神門"],"手首":["腕指","肘","神門"],"指の関節":["腕指","肝","神門"],
  "背中":["胸椎","腎","神門"],"腰":["腰椎","腎","神門"],"股関節":["股関節","骨盤","神門"],
  "お尻・骨盤まわり":["骨盤","腰椎","神門"],"太もも":["股関節","膝","神門"],
  "ふくらはぎ":["膝","足首","神門"],"膝":["膝","腎","神門"],"足首":["足首","膝","神門"],
  "足底":["足趾","腎","神門"],"足の指":["足趾","足首","神門"]
};
const BALANCE_SET = ["神門","内分泌","皮質下"];

/* emotion -> organ */
const EMO_ORGAN = {
  "最近イライラしやすいと感じる":"肝","しばらくストレス発散ができていない":"肝",
  "自分の感情に蓋をしている感じがする":"肺","リラックスするのが苦手":"心",
  "集中力が続かない":"脾","眠りが浅い":"心","あれこれ考えすぎてしまう":"脾",
  "心配事が頭から離れない":"脾","悲しい":"肺","憂鬱な気分が続いている":"肺",
  "落ち込む出来事があった":"肺","焦りやすい":"腎","怖さを感じる":"腎","記憶力が落ちたと感じる":"腎"
};
const ORGAN_PT = {"肺":"肺","腎":"腎","肝":"肝","心":"心","脾":"脾"};

/* Q8 -> extra reflex */
const BODYSTATE_PT = {
  "食いしばり・歯ぎしりがある／マウスピースをしている":"下顎",
  "首を動かすと痛む／ストレートネックと言われた":"頸肩",
  "月経周期が乱れがち／更年期症状を感じる":"内分泌",
  "四十肩・五十肩がある／座り仕事が多い／股関節が硬い":"骨盤"
};

/* ---------- questions ---------- */
const Q = [
  { id:"particles", type:"single", kicker:"Step 0",
    title:"耳ツボシールは、何粒くらいから始めたいですか？",

/* ---------- repeat engine (localStorage カルテ) ---------- */
function histKey(){ return "totonoune_hist_"+brand().key; }
function loadHistory(){ try{ return JSON.parse(localStorage.getItem(histKey())||"[]"); }catch(e){ return []; } }
function saveRecord(rec){ const h=loadHistory(); h.push(rec); try{ localStorage.setItem(histKey(),JSON.stringify(h.slice(-12))); }catch(e){} }
function lastRecord(){ const h=loadHistory(); return h.length? h[h.length-1] : null; }
function fmtDate(ts){ const d=new Date(ts); return (d.getMonth()+1)+"月"+d.getDate()+"日"; }

/* which questions are active (handles conditional Q2) */
function activeQuestions(){
  return Q.filter(q=>{
    if(q.id==="side") return BODY_PARTS.includes(state.main);
    return true;
  });
}
function isBodyMain(){ return BODY_PARTS.includes(state.main); }

/* dynamic options for "他に気になる不調" (exclude already chosen main) */
function subOptions(){
  const all=[...BODY_PARTS,...TROUBLES].filter(v=>v!==state.main);
  return [{value:"特になし",label:"特になし"},...all.map(v=>({value:v,label:v}))];
}

function renderQuestion(){
  const list = activeQuestions();
  if(qIndex>=list.length){ view="result"; return render(); }
  const q = list[qIndex];
  progressWrap.style.display="flex";
  nav.style.display="block";
  // progress
  const pct = Math.round((qIndex)/(list.length)*100);
  bar.style.width = Math.max(6,pct)+"%";
  stepno.textContent = `${qIndex+1} / ${list.length}`;

  let body = "";
  if(q.type==="single"){
    body = `<div class="opts">`+ q.options.map(o=>optHtml(o, state[q.id]===o.value, "single")).join("") +`</div>`;
  }
  else if(q.type==="single-grouped"){
    body = q.groups.map(g=>`
      <div class="group-label">${g.name}</div>
      <div class="opts grid">${g.values.map(v=>optHtml({value:v,label:v}, state[q.id]===v,"single")).join("")}</div>
    `).join("");
  }
  else if(q.type==="multi"){
    const opts = q.dynamic ? subOptions() : q.options;
    const sel = state[q.id]||[];
    body = `<div class="opts">`+ opts.map(o=>optHtml(o, sel.includes(o.value), "multi")).join("") +`</div>`;
  }
  else if(q.type==="rank"){
    const sel = state[q.id]||[];
    body = `<div class="opts">`+ q.options.map(o=>{
      const rank = sel.indexOf(o.value);
      return optHtml(o, rank>=0, "rank", rank>=0?rank+1:null, sel.length>=q.max && rank<0);
    }).join("") +`</div>
    <div class="counter">選択 ${sel.length}/${q.max}</div>`;
  }

  stage.innerHTML = `
    <div class="card enter" key="${q.id}">
      <div class="kicker">${q.kicker||""}</div>
      <h2 class="q-title mincho">${q.title}</h2>
      ${q.note?`<div class="q-note">${q.note}</div>`:""}
      ${body}
    </div>`;

  // wire option clicks
  stage.querySelectorAll('.opt').forEach(el=>{
    el.addEventListener('click',()=>onSelect(q, el.dataset.value));
  });

  // nav state
  backBtn.style.visibility = (qIndex===0) ? "hidden":"visible";
  nextBtn.textContent = (qIndex===list.length-1) ? "結果をみる" : "つぎへ";
  nextBtn.disabled = !isAnswered(q);
}

function optHtml(o, selected, kind, rankNum, disabled){
  const cls = ["opt", kind, selected?"sel":"", disabled?"disabled":""].join(" ");
  let marker;
  if(kind==="rank") marker = `<span class="rankbadge">${rankNum||""}</span>`;
  else marker = `<span class="mark">${CHECK}</span>`;
  return `<button class="${cls}" data-value="${escAttr(o.value)}" ${selected?'aria-pressed="true"':''}>
      ${marker}
      <span class="body"><span>${o.label}</span>${o.sub?`<span class="sub">${o.sub}</span>`:""}</span>
    </button>`;
}
function escAttr(s){return String(s).replace(/"/g,'&quot;');}

function onSelect(q, value){
  if(q.type==="single"||q.type==="single-grouped"){
    state[q.id]=value;
    if(q.id==="main"){ /* changing main resets dependent answers */ delete state.side; delete state.sub; }
  }
  else if(q.type==="multi"){
    const arr = new Set(state[q.id]||[]);
    const excl = (q.exclusive||[]);
    if(excl.includes(value)){
      // exclusive toggles alone
      if(arr.has(value)){ arr.delete(value); } else { arr.clear(); arr.add(value); }
    } else {
      excl.forEach(e=>arr.delete(e)); // picking a normal option clears any exclusive choice
      arr.has(value)?arr.delete(value):arr.add(value);
    }
    state[q.id]=[...arr];
  }
  else if(q.type==="rank"){
    const arr = [...(state[q.id]||[])];
    const i = arr.indexOf(value);
    if(i>=0) arr.splice(i,1);
    else if(arr.length<q.max) arr.push(value);
    state[q.id]=arr;
  }
  renderQuestion();
}

function isAnswered(q){
  const v = state[q.id];
  if(q.optional) return true;
  if(q.type==="multi") return Array.isArray(v)&&v.length>0;
  if(q.type==="rank")  return Array.isArray(v)&&v.length>0;
  return !!v;
}

/* ---------- nav handlers ---------- */
nextBtn.onclick=()=>{
  const list=activeQuestions();
  const q=list[qIndex];
  if(!isAnswered(q)) return;
  if(qIndex>=list.length-1){ view="result"; window.scrollTo(0,0); return render(); }

backBtn.onclick=()=>{

/* ---------- result computation ---------- */
function computeResult(){
  const cap = parseInt(state.particles||"3",10);
  const main = state.main;
  const primary = (COMPLAINT_PT[main]||["神門","内分泌","皮質下"]).slice();

  // emotions -> organ tally (weighted by rank: 1st=3,2nd=2,3rd=1)
  const emo = state.emotion||[];
  const organScore={};
  emo.forEach((e,i)=>{ const o=EMO_ORGAN[e]; if(o){ organScore[o]=(organScore[o]||0)+(3-i); } });
  const topOrgans = Object.keys(organScore).sort((a,b)=>organScore[b]-organScore[a]).slice(0,2);
  const emoPoints = topOrgans.map(o=>ORGAN_PT[o]).filter(Boolean);

  // body-state extras
  const bodyExtras = (state.bodystate||[]).map(v=>BODYSTATE_PT[v]).filter(Boolean);

  // build per-ear candidate lists
  const isBody = isBodyMain();
  const side = state.side;
  function buildEar(which){ // which: 'right'|'left'
    let list=[];
    if(isBody && side && side!=="both"){
      const affected = side; // 'right' or 'left'
      if(which===affected){ list=primary.slice(); }
      else { list=BALANCE_SET.slice(); }
    } else {
      list=primary.slice();
    }
    // append emotion reflex, then body extras (dedupe)
    [...emoPoints,...bodyExtras].forEach(p=>{ if(!list.includes(p)) list.push(p); });
    return list;
  }
  function splitCap(list){ return { placed:list.slice(0,cap), next:list.slice(cap) }; }

  const right = splitCap(buildEar('right'));
  const left  = splitCap(buildEar('left'));

  return {cap,main,primary,topOrgans,organScore,emoPoints,right,left,isBody,side};
}

  const mirror = (side==="left");

  const outline = `
    <g ${mirror?'transform="translate(200,0) scale(-1,1)"':''}>
      <path d="M150 60 C166 82 165 122 156 160 C150 196 134 226 110 246 C95 258 77 256 71 240 C65 224 70 205 70 196 C57 191 51 175 55 150 C59 119 71 95 96 76 C113 63 135 50 150 60 Z"
        fill="#FBF3E6" stroke="#E4D3B4" stroke-width="2"/>
      <path d="M138 74 C128 100 130 134 122 176" fill="none" stroke="#E9D9BC" stroke-width="7" stroke-linecap="round" opacity=".75"/>
      <path d="M138 74 C146 86 150 96 150 104" fill="none" stroke="#E9D9BC" stroke-width="7" stroke-linecap="round" opacity=".75"/>
      <ellipse cx="100" cy="150" rx="26" ry="33" fill="#F2E2C7" opacity=".7"/>
      <ellipse cx="100" cy="150" rx="13" ry="17" fill="#EAD6B2" opacity=".7"/>
      <path d="M70 150 C62 156 60 172 70 186" fill="#F4E6CC" stroke="#E4D3B4" stroke-width="1.5"/>
    </g>`;

        <line x1="${bx}" y1="${by}" x2="${bx}" y2="${by}" stroke="#C2A268" stroke-width="0"/>

      ${outline}${badges}

}

        <div class="ear-col">
          <div class="ear-name">右耳</div><div class="ear-sub">${rSub}</div>
          ${earSVG("right", r.right.placed)}
        </div>
        <div class="ear-col">
          <div class="ear-name">左耳</div><div class="ear-sub">${lSub}</div>
          ${earSVG("left", r.left.placed)}
        </div>
      </div>
      <div class="legend">
        <div style="font-size:11px;color:var(--muted);letter-spacing:.1em;margin-bottom:2px">右耳のポイント</div>
        ${legendFor(r.right.placed)}
      </div>
    </div>

    <div class="block reveal" style="animation-delay:.26s">
      <h3><span class="n">D</span>貼り方のご案内</h3>
      <ul class="howto" style="margin:6px 0 0;padding-left:18px">
        <li>写真・図の位置は<b>あくまで目安</b>です。マーク付近を指先でつまんで潰すように強く押し、<b>いちばん痛み・響きを感じるところ</b>に貼ってください。</li>
        <li>図とズレても問題ありません。<b>むしろそこが、本当に貼るべき場所</b>です。</li>
        <li>点線で示した候補は「押し比べ」用。押し比べて、いちばん響いたところに<b>1粒だけ</b>。左右で違う場所になっても大丈夫です。</li>
      </ul>
    </div>

    ${nextItems.length?`
    <div class="block reveal" style="animation-delay:.32s">
      <h3><span class="n">E</span>来月のご提案</h3>
      <p class="lead">今回の${r.cap}粒に入りきらなかった候補です。来月、組み直してご提案します。</p>
      <div class="next-list">
        ${nextItems.map(([ear,n])=>`<div class="next-item"><span class="ic">${ear}</span>${n} の反射区</div>`).join("")}
      </div>
    </div>`:""}

    <div class="block reveal" style="animation-delay:.38s">
      <h3><span class="n">F</span>マイカルテ・来月の見直し</h3>
      <p class="lead">このご提案を記録すると、来月「前回からの変化」を見ながら組み直せます。</p>
      ${prevCompare}
      <div class="reminder">
        <div class="rm-t">来月の見直しリマインド<small>1ヶ月後にLINE／メールでお知らせ（デモ）</small></div>
        <div class="adjust" id="remToggle" role="switch" aria-checked="false" tabindex="0"><span class="sw"></span>受け取る</div>
      </div>
      <div class="save-row">
        <button class="save-btn" id="saveChart">このカルテを保存する</button>
      </div>
    </div>

    <div class="block reveal" style="animation-delay:.44s">
      <h3><span class="n">G</span>さいごに</h3>
      <p class="closing">今回の貼り方で体がどう変わったか、来月のカウンセリングで聞かせてください。<br/>その手応えが、次のご提案をもっとあなたに合うものにします。</p>
    </div>

    <p class="disclaimer">※本アプリはセルフケアの提案ツールであり、医療行為ではありません。効果・安全性は未検証のデモです。耳の図と反射区の位置はイメージで、実際は「押し比べ」で決めてください。</p>

    <footer>
      <button class="restart" id="restartBtn">はじめからやり直す</button>
    </footer>`;

  backBtn.textContent="設問にもどる";

  // reminder toggle (demo)
  const remBtn=document.getElementById('remToggle');
  if(remBtn){
    const tog=()=>{ const on=remBtn.classList.toggle('on'); remBtn.setAttribute('aria-checked',on); };
    remBtn.onclick=tog;
    remBtn.onkeydown=(e)=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();tog();} };
  }
  // save my-chart (repeat engine)
  const saveBtn=document.getElementById('saveChart');
  if(saveBtn){
    saveBtn.onclick=()=>{
      saveRecord({ ts:Date.now(), main:state.main, cap:r.cap, organs:r.topOrgans });
      saveBtn.textContent="✓ カルテを保存しました";
      saveBtn.classList.add('done');
      saveBtn.disabled=true;
    };
  }

  document.getElementById('restartBtn').onclick=()=>{
    for(const k in state) delete state[k];
    view="hero"; qIndex=0;
    nextBtn.style.display=""; backBtn.style.flex="0 0 116px"; backBtn.textContent="もどる";
    window.scrollTo(0,0); render();
  };
}

/* ---------- keyboard: Enter to advance ---------- */
document.addEventListener('keydown',(e)=>{
  if(e.key==="Enter" && view==="q" && !nextBtn.disabled){ nextBtn.click(); }
});

applyBrand();
render();
</script>
</body>
</html>
