<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>totonouné ｜ 耳ツボセラピー</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#F7F2EA; --bg2:#FBF8F2; --card:#FFFFFF;
    --ink:#3B352D; --ink-soft:#6E665A; --muted:#A79C8B; --line:#E9E0D2;
    --gold:#C2A268; --gold-deep:#A9854B; --gold-soft:#F3EAD8; --rose:#C58E86;
    --shadow:0 14px 40px -18px rgba(80,60,30,.32);
    --shadow-sm:0 6px 18px -10px rgba(80,60,30,.30);
    --radius:20px; --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"Zen Kaku Gothic New","Hiragino Sans","Yu Gothic",system-ui,sans-serif;
    color:var(--ink);
    background:radial-gradient(1200px 600px at 50% -10%, #FFFDF8 0%, rgba(255,253,248,0) 60%),linear-gradient(180deg,var(--bg2),var(--bg));
    background-attachment:fixed;min-height:100vh;line-height:1.7;-webkit-font-smoothing:antialiased;
  }
  .mincho{font-family:"Shippori Mincho B1","Hiragino Mincho ProN","Yu Mincho",serif;}
  .shell{max-width:560px;margin:0 auto;padding:0 18px;min-height:100vh;display:flex;flex-direction:column;}

  /* Top bar */
  .topbar{position:sticky;top:0;z-index:30;padding:14px 2px 12px;background:linear-gradient(180deg, var(--bg2) 70%, rgba(251,248,242,0));}
  .brandrow{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .brand{font-family:"Shippori Mincho B1",serif;letter-spacing:.14em;font-size:15px;color:var(--ink);display:flex;align-items:center;gap:9px}
  .brand .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 4px var(--gold-soft)}
  .brand small{letter-spacing:.06em;color:var(--muted);font-family:"Zen Kaku Gothic New",sans-serif;font-size:10.5px;font-weight:500}
  .tools{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
  .adjust{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-soft);cursor:pointer;user-select:none;
    border:1px solid var(--line);background:#fff;padding:6px 10px;border-radius:999px;transition:.25s;white-space:nowrap}
  .adjust:hover{border-color:var(--gold)}
  .adjust .sw{width:30px;height:17px;border-radius:999px;background:#E4DBCB;position:relative;transition:.25s}
  .adjust .sw::after{content:"";position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:.25s var(--ease)}
  .adjust.on .sw{background:var(--gold)}
  .adjust.on .sw::after{left:15px}
  .swatch{width:13px;height:13px;border-radius:50%;background:var(--gold);box-shadow:inset 0 0 0 1.5px #fff,0 0 0 1px var(--line);transition:.3s}

  /* repeat / my-chart */
  .lastvisit{background:linear-gradient(180deg,#fff,var(--gold-soft));border:1px solid var(--line);border-radius:15px;padding:13px 15px;margin-bottom:16px;display:flex;align-items:center;gap:12px;text-align:left;box-shadow:var(--shadow-sm)}
  .lastvisit .lv-ic{flex:none;width:38px;height:38px;border-radius:50%;background:#fff;border:1px solid var(--line);display:grid;place-items:center;color:var(--gold-deep);font-size:18px}
  .lastvisit .lv-t{flex:1;font-size:12.5px;color:var(--ink-soft);line-height:1.5}
  .lastvisit .lv-t b{color:var(--ink);font-family:"Shippori Mincho B1",serif;font-weight:600}
  .reminder{display:flex;align-items:center;justify-content:space-between;gap:12px;background:#FBF7EF;border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-top:12px}
  .reminder .rm-t{font-size:13px;color:var(--ink)}
  .reminder .rm-t small{display:block;color:var(--muted);font-size:11px;margin-top:2px}
  .save-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .save-btn{flex:1;min-width:140px;border:1.5px solid var(--gold);background:#fff;color:var(--gold-deep);border-radius:13px;padding:12px;font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer;transition:.2s}
  .save-btn:hover{background:var(--gold-soft)}
  .save-btn.done{background:var(--gold);color:#fff;border-color:var(--gold)}
  .compare{margin-top:12px;font-size:12.5px;color:var(--ink-soft);background:#fff;border:1px dashed var(--gold);border-radius:12px;padding:11px 13px;line-height:1.6}
  .compare b{color:var(--gold-deep)}

  .progress-wrap{margin-top:11px;display:flex;align-items:center;gap:11px}
  .progress{flex:1;height:5px;border-radius:99px;background:#EBE2D2;overflow:hidden}
  .progress > i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--gold-deep));transition:width .55s var(--ease)}
  .stepno{font-size:11px;color:var(--muted);letter-spacing:.05em;font-variant-numeric:tabular-nums;white-space:nowrap}

  main{flex:1;display:flex;flex-direction:column;justify-content:flex-start;padding:8px 0 130px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px 22px 24px;position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;inset:0 0 auto 0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5}

  .kicker{font-size:11.5px;letter-spacing:.18em;color:var(--gold-deep);font-weight:700;text-transform:uppercase;margin-bottom:9px}
  .q-title{font-family:"Shippori Mincho B1",serif;font-size:21px;line-height:1.55;font-weight:600;letter-spacing:.01em;margin:0 0 6px}
  .q-note{font-size:12.5px;color:var(--ink-soft);background:var(--gold-soft);border-radius:12px;padding:10px 13px;margin:12px 0 4px;line-height:1.6}
  .group-label{font-size:11px;letter-spacing:.14em;color:var(--muted);font-weight:700;margin:20px 0 9px;display:flex;align-items:center;gap:9px}
  .group-label::after{content:"";flex:1;height:1px;background:var(--line)}

  .opts{display:flex;flex-direction:column;gap:9px;margin-top:14px}
  .opts.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .opt{appearance:none;text-align:left;border:1.5px solid var(--line);background:#FFFEFB;border-radius:14px;padding:13px 14px;cursor:pointer;transition:.2s var(--ease);display:flex;align-items:flex-start;gap:11px;font-family:inherit;color:var(--ink);font-size:14.5px;line-height:1.45;width:100%}
  .opt:hover{border-color:var(--gold);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
  .opt:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .opt .mark{flex:none;width:21px;height:21px;border-radius:50%;border:1.5px solid var(--line);display:grid;place-items:center;margin-top:1px;transition:.2s}
  .opt.multi .mark{border-radius:7px}
  .opt .mark svg{width:12px;height:12px;opacity:0;transform:scale(.4);transition:.2s var(--ease)}
  .opt .body{display:flex;flex-direction:column}
  .opt .sub{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.4}
  .opt.sel{border-color:var(--gold);background:linear-gradient(180deg,#FFFDF6,var(--gold-soft));box-shadow:var(--shadow-sm)}
  .opt.sel .mark{background:var(--gold);border-color:var(--gold)}
  .opt.sel .mark svg{opacity:1;transform:scale(1);color:#fff}
  .opt .rankbadge{flex:none;width:21px;height:21px;border-radius:50%;border:1.5px solid var(--line);display:grid;place-items:center;margin-top:1px;font-size:12px;font-weight:700;color:var(--muted);transition:.2s}
  .opt.sel .rankbadge{background:var(--gold);border-color:var(--gold);color:#fff}
  .opt.disabled{opacity:.4;pointer-events:none}
  .counter{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--gold-deep);background:var(--gold-soft);border-radius:99px;padding:4px 11px;margin-top:14px;font-weight:700;font-variant-numeric:tabular-nums}

  .nav{position:fixed;left:0;right:0;bottom:0;z-index:40;background:linear-gradient(180deg,rgba(247,242,234,0),var(--bg) 38%);padding:16px 0 max(18px,env(safe-area-inset-bottom))}
  .nav-inner{max-width:560px;margin:0 auto;padding:0 18px;display:flex;gap:12px}
  .btn{flex:1;border:none;border-radius:15px;padding:15px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:.2s var(--ease);letter-spacing:.04em}
  .btn-ghost{flex:0 0 116px;background:#fff;border:1.5px solid var(--line);color:var(--ink-soft)}
  .btn-ghost:hover{border-color:var(--gold);color:var(--ink)}
  .btn-primary{background:linear-gradient(180deg,#4A4339,#3B352D);color:#F6EFE1;box-shadow:0 10px 24px -12px rgba(59,53,45,.8)}
  .btn-primary:hover{transform:translateY(-1px)}
  .btn-primary:disabled{background:#E7DECF;color:#B7AC99;cursor:not-allowed;transform:none;box-shadow:none}

  .hero{text-align:center;padding:46px 22px 40px}
  .hero .glyph{width:62px;height:62px;margin:0 auto 22px;display:grid;place-items:center;border-radius:50%;background:linear-gradient(180deg,#fff,var(--gold-soft));border:1px solid var(--line);box-shadow:var(--shadow-sm)}
  .hero .glyph svg{width:34px;height:34px;color:var(--gold-deep)}
  .hero h1{font-family:"Shippori Mincho B1",serif;font-weight:600;font-size:27px;line-height:1.6;margin:0 0 6px;letter-spacing:.02em}
  .hero .cn{font-family:"Shippori Mincho B1",serif;color:var(--gold-deep);letter-spacing:.3em;font-size:13px;margin-bottom:20px}
  .hero p{color:var(--ink-soft);font-size:14px;max-width:380px;margin:0 auto 8px}
  .hero .steps-mini{display:flex;justify-content:center;gap:7px;margin:26px 0 6px;flex-wrap:wrap}
  .hero .steps-mini span{font-size:11px;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:99px;padding:5px 12px}

  .enter{animation:enter .5s var(--ease) both}
  @keyframes enter{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .reveal{opacity:0;transform:translateY(16px);animation:enter .6s var(--ease) forwards}

  .res-head{text-align:center;padding:8px 6px 4px}
  .res-head .kicker{margin-bottom:8px}
  .res-head h2{font-family:"Shippori Mincho B1",serif;font-size:23px;font-weight:600;margin:0 0 6px;line-height:1.5}
  .res-head p{color:var(--ink-soft);font-size:13px;margin:0}
  .block{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:20px 18px;margin-top:16px}
  .block h3{font-family:"Shippori Mincho B1",serif;font-size:16px;font-weight:600;margin:0 0 4px;display:flex;align-items:center;gap:9px}
  .block h3 .n{flex:none;width:24px;height:24px;border-radius:8px;background:var(--gold-soft);color:var(--gold-deep);display:grid;place-items:center;font-size:12px;font-weight:800;font-family:"Zen Kaku Gothic New",sans-serif}
  .block .lead{font-size:12px;color:var(--muted);margin:0 0 12px}
  .summary{display:grid;grid-template-columns:auto 1fr;gap:9px 14px;font-size:13.5px}
  .summary dt{color:var(--muted);font-size:12px;white-space:nowrap}
  .summary dd{margin:0;color:var(--ink)}
  .emo-flow{display:flex;flex-direction:column;gap:8px}
  .emo-row{display:flex;align-items:center;gap:10px;font-size:13.5px}
  .emo-row .e{flex:1;color:var(--ink-soft)}
  .emo-row .arr{color:var(--gold);font-size:12px}
  .organ-chip{display:inline-grid;place-items:center;min-width:34px;height:34px;border-radius:10px;padding:0 9px;font-family:"Shippori Mincho B1",serif;font-size:16px;font-weight:600;color:#fff;background:linear-gradient(180deg,var(--gold),var(--gold-deep));box-shadow:var(--shadow-sm)}
  .organ-summary{margin-top:14px;padding:13px 14px;border-radius:13px;background:var(--gold-soft);font-size:13.5px;line-height:1.7;color:var(--ink)}
  .organ-summary b{color:var(--gold-deep)}
  .ears{display:flex;gap:12px;margin-top:6px}
  .ear-col{flex:1;text-align:center}
  .ear-col .ear-name{font-family:"Shippori Mincho B1",serif;font-size:14px;margin-bottom:2px}
  .ear-col .ear-sub{font-size:10.5px;color:var(--muted);margin-bottom:6px;min-height:14px}
  .ear-svg{width:100%;height:auto;display:block;border-radius:12px}
  .ear-svg.editable{outline:2px dashed var(--gold);outline-offset:2px;touch-action:none;cursor:grab}
  .adjust-hint{font-size:11.5px;color:var(--gold-deep);background:var(--gold-soft);border-radius:10px;padding:8px 11px;margin:0 0 10px;line-height:1.5}
  .badge-pop{transform-origin:center;animation:pop .45s var(--ease) both}
  @keyframes pop{0%{opacity:0;transform:scale(.2)}70%{transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
  .legend{margin-top:14px;display:flex;flex-direction:column;gap:7px}
  .legend .li{display:flex;align-items:flex-start;gap:10px;font-size:12.5px;color:var(--ink-soft)}
  .legend .li .b{flex:none;width:20px;height:20px;border-radius:50%;background:linear-gradient(180deg,var(--gold),var(--gold-deep));color:#fff;display:grid;place-items:center;font-size:11px;font-weight:700;margin-top:1px}
  .legend .li b{color:var(--ink);font-weight:600}
  .howto li{font-size:13px;color:var(--ink-soft);margin-bottom:9px;line-height:1.65}
  .howto li b{color:var(--ink)}
  .next-list{display:flex;flex-direction:column;gap:8px;margin-top:4px}
  .next-item{display:flex;align-items:center;gap:10px;font-size:13px;background:#FBF7EF;border:1px dashed var(--gold);border-radius:12px;padding:10px 13px}
  .next-item .ic{color:var(--gold-deep);font-size:11px;font-weight:700;background:#fff;border-radius:99px;padding:3px 9px;border:1px solid var(--line)}
  .closing{font-size:13.5px;color:var(--ink-soft);line-height:1.8;text-align:center;padding:6px 4px}
  .disclaimer{font-size:11px;color:var(--muted);text-align:center;margin:22px 6px 0;line-height:1.7}
  footer{padding:14px 0 40px;text-align:center}
  .restart{background:none;border:1px solid var(--line);color:var(--ink-soft);border-radius:99px;padding:11px 22px;font-family:inherit;font-size:13px;cursor:pointer;transition:.2s}
  .restart:hover{border-color:var(--gold);color:var(--ink)}

  /* ===== Admin ===== */
  .admin-overlay{position:fixed;inset:0;z-index:100;background:rgba(40,34,28,.46);backdrop-filter:blur(3px);display:none;padding:0}
  .admin-overlay.open{display:block}
  .admin-sheet{max-width:720px;margin:18px auto;height:calc(100vh - 36px);background:#fff;border-radius:20px;box-shadow:0 30px 80px -20px rgba(40,30,10,.5);display:flex;flex-direction:column;overflow:hidden}
  .admin-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff,var(--gold-soft))}
  .admin-head h2{font-family:"Shippori Mincho B1",serif;font-size:17px;margin:0;color:var(--ink)}
  .admin-head .sub{font-size:11px;color:var(--muted);margin-top:2px}
  .x-btn{border:1px solid var(--line);background:#fff;border-radius:50%;width:34px;height:34px;font-size:17px;cursor:pointer;color:var(--ink-soft);line-height:1}
  .x-btn:hover{border-color:var(--gold)}
  .admin-tabs{display:flex;gap:6px;overflow-x:auto;padding:12px 18px 0;background:#FBF8F2}
  .admin-tab{flex:none;border:1px solid var(--line);background:#fff;border-radius:999px 999px 0 0;padding:9px 15px;font-family:inherit;font-size:12.5px;color:var(--ink-soft);cursor:pointer;font-weight:700;border-bottom:none}
  .admin-tab.active{background:var(--gold);color:#fff;border-color:var(--gold)}
  .admin-body{padding:18px;overflow:auto;flex:1;background:#FBF8F2}
  .admin-foot{display:flex;gap:10px;padding:13px 18px;border-top:1px solid var(--line);background:#fff;flex-wrap:wrap}
  .a-note{font-size:12px;color:var(--ink-soft);background:#FFF7E8;border:1px solid var(--gold-soft);border-radius:10px;padding:10px 12px;margin-bottom:14px;line-height:1.6}
  .fld{margin-bottom:13px}
  .fld>label{font-size:11.5px;color:var(--ink-soft);display:block;margin-bottom:5px;font-weight:700;letter-spacing:.02em}
  .fld input[type=text],.fld textarea,.adm-in{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:9px 11px;font-family:inherit;font-size:13.5px;color:var(--ink);background:#FFFEFB}
  .fld textarea{min-height:60px;resize:vertical;line-height:1.55}
  .fld input:focus,.fld textarea:focus,.adm-in:focus{outline:none;border-color:var(--gold)}
  .qedit{border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px;background:#fff;box-shadow:var(--shadow-sm)}
  .qedit .qh{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .qedit .qh .tag{font-size:10.5px;font-weight:700;color:var(--gold-deep);background:var(--gold-soft);padding:3px 9px;border-radius:99px}
  .opt-row{display:flex;gap:7px;margin-bottom:7px;align-items:center}
  .opt-row .adm-in{flex:1}
  .grp{border:1px dashed var(--line);border-radius:11px;padding:11px;margin-bottom:11px;background:#FCFAF5}
  .mini-btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 11px;font-size:12px;cursor:pointer;font-family:inherit;color:var(--ink-soft);white-space:nowrap}
  .mini-btn:hover{border-color:var(--gold);color:var(--ink)}
  .mini-btn.danger{color:#B5544A}
  .mini-btn.danger:hover{border-color:#C97A6E;background:#FBEDEB}
  .mini-btn.gold{background:var(--gold);color:#fff;border-color:var(--gold)}
  .sec-title{font-family:"Shippori Mincho B1",serif;font-size:14px;color:var(--ink);margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
  .sec-title:first-child{margin-top:0}
  .color-row{display:flex;gap:14px;flex-wrap:wrap}
  .color-row .ci{display:flex;flex-direction:column;gap:5px;font-size:11px;color:var(--ink-soft)}
  .color-row input[type=color]{width:52px;height:38px;border:1px solid var(--line);border-radius:9px;background:#fff;padding:2px;cursor:pointer}
  .ear-editor{display:flex;gap:16px;flex-wrap:wrap}
  .ear-edit-stage{flex:1;min-width:240px}
  .ear-edit-svg{width:100%;border:1px solid var(--line);border-radius:14px;background:#FBF3E6;touch-action:none;display:block}
  .ear-edit-svg .pt-badge{cursor:grab}
  .ear-side{flex:1;min-width:200px}
  .upload-row{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:10px}
  .ta-mono{width:100%;min-height:150px;border:1.5px solid var(--line);border-radius:10px;padding:11px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;color:var(--ink);background:#FFFEFB;line-height:1.5}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(8px);background:var(--ink);color:#F6EFE1;padding:10px 18px;border-radius:999px;font-size:13px;z-index:200;opacity:0;transition:.3s var(--ease);pointer-events:none;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion: reduce){*{animation-duration:.001ms !important;transition-duration:.05ms !important}}
  @media (max-width:380px){ .opts.grid{grid-template-columns:1fr} }
</style>
</head>
<body>
<div class="shell">
  <div class="topbar" id="topbar">
    <div class="brandrow">
      <div class="brand"><span class="dot"></span><span id="brandName" class="mincho">totonoué</span>&nbsp;<small id="brandTag">耳ツボセラピー</small></div>
      <div class="tools">
        <div class="adjust" id="brandSwitch" tabindex="0" title="ホワイトラベル：院ごとにブランドを差し替え（デモ）"><span class="swatch" id="swatch"></span>店舗</div>
        <div class="adjust" id="adjust" role="switch" aria-checked="false" tabindex="0" title="結果の耳マップ上のポイント位置をドラッグで微調整"><span class="sw"></span>位置調整</div>
        <div class="adjust" id="adminBtn" tabindex="0" title="管理画面（文言・設問・耳マップを編集）">⚙ 管理</div>
      </div>
    </div>
    <div class="progress-wrap" id="progressWrap" style="display:none">
      <div class="progress"><i id="bar"></i></div>
      <div class="stepno" id="stepno">1 / 9</div>
    </div>
  </div>
  <main id="stage"></main>
</div>

<div class="nav" id="nav" style="display:none">
  <div class="nav-inner">
    <button class="btn btn-ghost" id="back">もどる</button>
    <button class="btn btn-primary" id="next">つぎへ</button>
  </div>
</div>

<div class="admin-overlay" id="adminOverlay"></div>
<div class="toast" id="toast"></div>

<script>
/* ===================== icons ===================== */

/* ===================== CONFIG (editable, localStorage-backed) ===================== */
const CFG_KEY = "totonoune_cfg_v1";
function clone(o){ return JSON.parse(JSON.stringify(o)); }
function deepMerge(base, over){
  if(Array.isArray(base)) return (over!=null? over : base);
  if(base && typeof base==="object"){
    const out=Array.isArray(base)?[]:{...base};
    for(const k in base) out[k]=deepMerge(base[k], over? over[k] : undefined);
    if(over) for(const k in over) if(!(k in base)) out[k]=over[k];
    return out;
  }
  return (over!==undefined? over : base);
}
let CONFIG = {};
function loadConfig(){
  let s={}; try{ s=JSON.parse(localStorage.getItem(CFG_KEY)||"{}"); }catch(e){}
  CONFIG = {
    content: deepMerge(clone(DEFAULT_CONTENT), s.content||{}),
    questions: (Array.isArray(s.questions)&&s.questions.length)? s.questions : clone(DEFAULT_Q),
    points: s.points||{},
    earImages: Object.assign({right:null,left:null}, s.earImages||{}),
    brands: s.brands||{}
  };
}
function saveConfig(){
  try{ localStorage.setItem(CFG_KEY, JSON.stringify(CONFIG)); }
  catch(e){ toast("保存できませんでした（画像が大きすぎる可能性）"); }
}
function applyConfigToRuntime(){
  Q = CONFIG.questions;
  BRAND_PRESETS.forEach(b=>{ const o=CONFIG.brands[b.key]; if(o) Object.assign(b,o); });
}
function CT(){ return CONFIG.content; }
function tpl(s,d){ return String(s==null?"":s).replace(/\{cap\}/g, (d&&d.cap)!=null? d.cap : ""); }
function CFGpt(name){ return (CONFIG.points&&CONFIG.points[name]) || PT[name] || [100,150]; }

function mainQ(){ return Q.find(q=>q.id==="main"); }
function bodyParts(){ const m=mainQ(); return (m&&m.groups&&m.groups[0]&&m.groups[0].values)||BODY_PARTS; }
function troubles(){ const m=mainQ(); return (m&&m.groups&&m.groups[1]&&m.groups[1].values)||TROUBLES; }
function activeQuestions(){ return Q.filter(q=> q.id==="side"? bodyParts().includes(state.main) : true); }
function isBodyMain(){ return bodyParts().includes(state.main); }
function subOptions(){
  const all=[...bodyParts(),...troubles()].filter(v=>v!==state.main);
  return [{value:"特になし",label:"特になし"},...all.map(v=>({value:v,label:v}))];
}

function render(){

function renderQuestion(){
  const list = activeQuestions();
  if(qIndex>=list.length){ view="result"; return render(); }
  const q = list[qIndex];
  progressWrap.style.display="flex"; nav.style.display="block";
  const pct = Math.round((qIndex)/(list.length)*100);
  bar.style.width = Math.max(6,pct)+"%";
  stepno.textContent = `${qIndex+1} / ${list.length}`;

  let body = "";
  if(q.type==="single"){
    body = `<div class="opts">`+ (q.options||[]).map(o=>optHtml(o, state[q.id]===o.value, "single")).join("") +`</div>`;
  } else if(q.type==="single-grouped"){
    body = (q.groups||[]).map(g=>`
      <div class="group-label">${g.name}</div>
      <div class="opts grid">${(g.values||[]).map(v=>optHtml({value:v,label:v}, state[q.id]===v,"single")).join("")}</div>`).join("");
  } else if(q.type==="multi"){
    const opts = q.dynamic ? subOptions() : (q.options||[]);
    const sel = state[q.id]||[];
    body = `<div class="opts">`+ opts.map(o=>optHtml(o, sel.includes(o.value), "multi")).join("") +`</div>`;
  } else if(q.type==="rank"){
    const sel = state[q.id]||[];
    body = `<div class="opts">`+ (q.options||[]).map(o=>{
      const rank = sel.indexOf(o.value);
      return optHtml(o, rank>=0, "rank", rank>=0?rank+1:null, sel.length>=q.max && rank<0);
    }).join("") +`</div><div class="counter">選択 ${sel.length}/${q.max}</div>`;
  }

  stage.innerHTML = `
    <div class="card enter">
      <div class="kicker">${q.kicker||""}</div>
      <h2 class="q-title mincho">${q.title}</h2>
      ${q.note?`<div class="q-note">${q.note}</div>`:""}
      ${body}
    </div>`;
  stage.querySelectorAll('.opt').forEach(el=> el.addEventListener('click',()=>onSelect(q, el.dataset.value)) );
  backBtn.style.visibility = (qIndex===0) ? "hidden":"visible";
  nextBtn.textContent = (qIndex===list.length-1) ? "結果をみる" : "つぎへ";
  nextBtn.disabled = !isAnswered(q);
}

function optHtml(o, selected, kind, rankNum, disabled){
  const cls = ["opt", kind, selected?"sel":"", disabled?"disabled":""].join(" ");
  const marker = (kind==="rank") ? `<span class="rankbadge">${rankNum||""}</span>` : `<span class="mark">${CHECK}</span>`;
  return `<button class="${cls}" data-value="${escAttr(o.value)}" ${selected?'aria-pressed="true"':''}>
      ${marker}<span class="body"><span>${o.label}</span>${o.sub?`<span class="sub">${o.sub}</span>`:""}</span></button>`;
}
function escAttr(s){return String(s).replace(/"/g,'&quot;');}

function onSelect(q, value){
  if(q.type==="single"||q.type==="single-grouped"){
    state[q.id]=value;
    if(q.id==="main"){ delete state.side; delete state.sub; }
  } else if(q.type==="multi"){
    const arr = new Set(state[q.id]||[]); const excl = (q.exclusive||[]);
    if(excl.includes(value)){ arr.has(value)? arr.delete(value) : (arr.clear(), arr.add(value)); }
    else { excl.forEach(e=>arr.delete(e)); arr.has(value)?arr.delete(value):arr.add(value); }
    state[q.id]=[...arr];
  } else if(q.type==="rank"){
    const arr = [...(state[q.id]||[])]; const i = arr.indexOf(value);
    if(i>=0) arr.splice(i,1); else if(arr.length<q.max) arr.push(value);
    state[q.id]=arr;
  }
  renderQuestion();
}

function isAnswered(q){
  const v = state[q.id];
  if(q.optional) return true;
  if(q.type==="multi"||q.type==="rank") return Array.isArray(v)&&v.length>0;
  return !!v;
}

nextBtn.onclick=()=>{
  const list=activeQuestions(); const q=list[qIndex];
  if(!isAnswered(q)) return;
  if(qIndex>=list.length-1){ view="result"; window.scrollTo(0,0); return render(); }
  qIndex++; window.scrollTo(0,0); render();
};
backBtn.onclick=()=>{
  if(view==="result"){ view="q"; qIndex=activeQuestions().length-1; window.scrollTo(0,0); return render(); }
  if(qIndex>0){ qIndex--; window.scrollTo(0,0); render(); }
};

/* ===================== result computation ===================== */
function computeResult(){
  const cap = parseInt(state.particles||"3",10);
  const main = state.main;
  const primary = (COMPLAINT_PT[main]||["神門","内分泌","皮質下"]).slice();
  const emo = state.emotion||[]; const organScore={};
  emo.forEach((e,i)=>{ const o=EMO_ORGAN[e]; if(o){ organScore[o]=(organScore[o]||0)+(3-i); } });
  const topOrgans = Object.keys(organScore).sort((a,b)=>organScore[b]-organScore[a]).slice(0,2);
  const emoPoints = topOrgans.map(o=>ORGAN_PT[o]).filter(Boolean);
  const bodyExtras = (state.bodystate||[]).map(v=>BODYSTATE_PT[v]).filter(Boolean);
  const isBody = isBodyMain(); const side = state.side;
  function buildEar(which){
    let list=[];
    if(isBody && side && side!=="both"){ list = (which===side)? primary.slice() : BALANCE_SET.slice(); }
    else { list = primary.slice(); }
    [...emoPoints,...bodyExtras].forEach(p=>{ if(!list.includes(p)) list.push(p); });
    return list;
  }
  const splitCap = list => ({ placed:list.slice(0,cap), next:list.slice(cap) });
  return {cap,main,primary,topOrgans,organScore,emoPoints,right:splitCap(buildEar('right')),left:splitCap(buildEar('left')),isBody,side};
}

function earSVG(side, placed, editable){
  const mirror=(side==="left"); const X=x=> mirror?200-x:x;
  const bg=CONFIG.earImages&&CONFIG.earImages[side];
  const back = bg
    ? `<image href="${bg}" x="0" y="0" width="200" height="280" preserveAspectRatio="xMidYMid slice" ${mirror?'transform="translate(200,0) scale(-1,1)"':''}/>`
    : `<g ${mirror?'transform="translate(200,0) scale(-1,1)"':''}>${EAR_OUTLINE}</g>`;
  const badges = placed.map((name,i)=>{
    const c=CFGpt(name); const x=X(c[0]), y=c[1];
    return `<g class="ptg" data-name="${name}" data-side="${side}" transform="translate(${x},${y})">
        <g class="badge-pop" style="animation-delay:${i*90}ms">
          <circle cx="0" cy="0" r="13" fill="url(#g_${side})" stroke="#fff" stroke-width="2"/>
          <text x="0" y="4.5" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" font-family="Zen Kaku Gothic New,sans-serif">${i+1}</text>
        </g></g>`;
  }).join("");
  return `<svg class="ear-svg${editable?' editable':''}" data-ear="${side}" viewBox="0 0 200 280" role="img" aria-label="${side==='right'?'右':'左'}耳の反射区マップ">
      ${gradDef('g_'+side)}${back}${badges}</svg>`;
}

/* drag support for ear points */
function enableEarDrag(svg){
  let cur=null;
  function toVB(evt){ const p=svg.createSVGPoint(); p.x=evt.clientX; p.y=evt.clientY; const m=svg.getScreenCTM(); if(!m) return null; const q=p.matrixTransform(m.inverse()); return [q.x,q.y]; }
  svg.querySelectorAll('[data-name]').forEach(g=>{
    g.addEventListener('pointerdown', e=>{ cur=g; try{g.setPointerCapture(e.pointerId);}catch(_){} e.preventDefault(); });
  });
  svg.addEventListener('pointermove', e=>{
    if(!cur) return;
    const vb=toVB(e); if(!vb) return;
    let x=Math.max(8,Math.min(192,vb[0])), y=Math.max(8,Math.min(272,vb[1]));
    cur.setAttribute('transform',`translate(${x},${y})`); cur._xy=[x,y];
  });
  function end(){
    if(!cur) return;
    const name=cur.getAttribute('data-name'), sideAttr=cur.getAttribute('data-side'), xy=cur._xy;
    if(xy){ const sx = sideAttr==='left'? 200-xy[0] : xy[0]; CONFIG.points[name]=[Math.round(sx),Math.round(xy[1])]; saveConfig(); toast(`「${name}」の位置を保存しました`); }
    cur=null;
  }
  svg.addEventListener('pointerup', end);
  svg.addEventListener('pointercancel', end);
}

function htmlEsc(s){ return String(s==null?"":s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function attrEsc(s){ return String(s==null?"":s).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }
function getPath(obj,path){ return path.split('.').reduce((o,k)=> o==null?undefined:o[k], obj); }

        (g.values||[]).forEach((val,vi)=>{
          html+=`<div class="opt-row"><input class="adm-in" type="text" data-q="${qi}" data-g="${gi}" data-v="${vi}" value="${attrEsc(val)}"/><button class="mini-btn danger" data-act="delGval" data-q="${qi}" data-g="${gi}" data-v="${vi}">削除</button></div>`;

        html+=`<button class="mini-btn" data-act="addGval" data-q="${qi}" data-g="${gi}">＋ 項目を追加</button></div>`;

    } else if(Array.isArray(q.options)){
      const fixedVal = (q.id==="particles"||q.id==="side"); // 値はロジック用に固定
      if(q.id==="emotion") html+=`<div class="a-note" style="margin:0 0 10px">※感情の選択肢は五臓マッピングのキーです。文言変更時はマッピング更新が必要になる場合があります。</div>`;
      q.options.forEach((o,oi)=>{
        html+=`<div class="opt-row"><input class="adm-in" type="text" data-q="${qi}" data-o="${oi}" data-of="label" value="${attrEsc(o.label)}"/>`;

      });
      html+=`<button class="mini-btn" data-act="addOpt" data-q="${qi}">＋ 選択肢を追加</button>`;
    }
    html+=`</div>`;
  });
  html+=`<button class="mini-btn danger" data-act="resetQ">設問をすべて初期状態に戻す</button>`;
  body.innerHTML=html;

  body.querySelectorAll('[data-f]').forEach(el=> el.addEventListener('input',()=>{ Q[+el.dataset.q][el.dataset.f]=el.value; saveConfig(); }) );

    const q=Q[+el.dataset.q], o=q.options[+el.dataset.o]; o[el.dataset.of]=el.value;
    if(el.dataset.of==="label" && !(q.id==="particles"||q.id==="side")) o.value=el.value;
    saveConfig();
  }));
  body.querySelectorAll('[data-act]').forEach(b=> b.onclick=()=>handleQAction(b.dataset));
}
function handleQAction(d){
  const qi=+d.q;
  if(d.act==="addOpt"){ const q=Q[qi]; q.options=q.options||[]; q.options.push({value:"新しい選択肢",label:"新しい選択肢"}); }
  else if(d.act==="delOpt"){ Q[qi].options.splice(+d.o,1); }
  else if(d.act==="addGval"){ Q[qi].groups[+d.g].values.push("新しい項目"); }
  else if(d.act==="delGval"){ Q[qi].groups[+d.g].values.splice(+d.v,1); }
  else if(d.act==="resetQ"){ CONFIG.questions=clone(DEFAULT_Q); Q=CONFIG.questions; }
  saveConfig(); renderQuestionsTab(adminOverlay.querySelector('#admBody'));
}

/* ---- ear tab ---- */
function renderEarTab(body){
  body.innerHTML=`
    <div class="a-note">耳の写真をアップロードし、各ポイントを<b>ドラッグ</b>して貼付位置を設定できます。位置は<b>右耳の座標</b>で編集し、左耳は自動で左右反転されます（自動保存）。</div>
    <div class="ear-editor">
      <div class="ear-edit-stage">
        <div class="upload-row">
          <label class="mini-btn">右耳画像を選ぶ<input type="file" accept="image/*" id="upR" hidden></label>
          <label class="mini-btn">左耳画像を選ぶ<input type="file" accept="image/*" id="upL" hidden></label>
        </div>
        <div id="earEditHolder"></div>
        <div style="display:flex;gap:8px;margin-top:9px;flex-wrap:wrap">
          <button class="mini-btn danger" id="earClearImg">画像を消す</button>
          <button class="mini-btn danger" id="earResetPts">位置を初期化</button>
        </div>
      </div>
      <div class="ear-side">
        <div class="sec-title" style="margin-top:0">プレビュー（結果画面の見え方）</div>
        <div id="earPreview"></div>
        <p style="font-size:11.5px;color:var(--ink-soft);line-height:1.6;margin-top:8px">左の編集マップでドラッグした位置が、結果画面の番号バッジに反映されます。番号は診断結果ごとに自動で決まります。</p>
      </div>
    </div>`;
  drawEarEditor();
  const previews = ()=>{ adminOverlay.querySelector('#earPreview').innerHTML =
    `<div style="display:flex;gap:10px"><div style="flex:1">${earSVG('right',['神門','腎','脾'],false)}<div style="text-align:center;font-size:11px;color:var(--muted)">右耳</div></div>
     <div style="flex:1">${earSVG('left',['神門','腎','脾'],false)}<div style="text-align:center;font-size:11px;color:var(--muted)">左耳</div></div></div>`; };
  previews();

  function readImg(file, cb){ const fr=new FileReader(); fr.onload=()=>cb(fr.result); fr.readAsDataURL(file); }
  adminOverlay.querySelector('#upR').onchange=e=>{ const f=e.target.files[0]; if(f) readImg(f,d=>{ CONFIG.earImages.right=d; saveConfig(); drawEarEditor(); previews(); toast("右耳の画像を設定しました"); }); };
  adminOverlay.querySelector('#upL').onchange=e=>{ const f=e.target.files[0]; if(f) readImg(f,d=>{ CONFIG.earImages.left=d; saveConfig(); previews(); toast("左耳の画像を設定しました"); }); };
  adminOverlay.querySelector('#earClearImg').onclick=()=>{ CONFIG.earImages={right:null,left:null}; saveConfig(); drawEarEditor(); previews(); toast("画像を消しました"); };
  adminOverlay.querySelector('#earResetPts').onclick=()=>{ CONFIG.points={}; saveConfig(); drawEarEditor(); previews(); toast("ポイント位置を初期化しました"); };
}
function drawEarEditor(){
  const holder=adminOverlay.querySelector('#earEditHolder'); if(!holder) return;
  const bg=CONFIG.earImages&&CONFIG.earImages.right;
  const back = bg ? `<image href="${bg}" x="0" y="0" width="200" height="280" preserveAspectRatio="xMidYMid slice"/>` : `<g>${EAR_OUTLINE}</g>`;
  const dots=Object.keys(PT).map(name=>{ const c=CFGpt(name); return `<g class="pt-badge" data-name="${name}" data-side="edit" transform="translate(${c[0]},${c[1]})">
      <circle cx="0" cy="0" r="7.5" fill="url(#g_edit)" stroke="#fff" stroke-width="1.5"/>
      <text x="0" y="-10" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3B352D" stroke="#FBF3E6" stroke-width="2.4" paint-order="stroke" font-family="Zen Kaku Gothic New,sans-serif">${name}</text>
    </g>`; }).join("");
  holder.innerHTML=`<svg class="ear-edit-svg" viewBox="0 0 200 280">${gradDef('g_edit')}${back}${dots}</svg>`;
  enableEarDrag(holder.querySelector('svg'));
}

/* ---- brand tab ---- */
function renderBrandTab(body){
  const b=brand();
  body.innerHTML=`
    <div class="a-note">いま選択中のブランド「<b>${attrEsc(b.name)}</b>」の見た目を編集します。右上「店舗」で別ブランドに切り替えてから編集すると、各院ごとに設定できます。</div>
    <div class="fld"><label>院・サロン名</label><input class="adm-in" type="text" id="bName" value="${attrEsc(b.name)}"/></div>
    <div class="fld"><label>サブタイトル</label><input class="adm-in" type="text" id="bTag" value="${attrEsc(b.tag)}"/></div>
    <div class="fld"><label>装飾の漢字（ヒーロー上部）</label><input class="adm-in" type="text" id="bCn" value="${attrEsc(b.cn)}"/></div>
    <div class="fld"><label>キャッチコピー（&lt;br/&gt;改行可）</label><textarea id="bCatch">${htmlEsc(b.catch)}</textarea></div>
    <div class="sec-title">テーマカラー</div>
    <div class="color-row">
      <label class="ci">メイン<input type="color" id="cGold" value="${hex(b.gold)}"></label>
      <label class="ci">濃いめ<input type="color" id="cDeep" value="${hex(b.deep)}"></label>
      <label class="ci">淡い背景<input type="color" id="cSoft" value="${hex(b.soft)}"></label>
    </div>`;
  function setB(field,val){ b[field]=val; CONFIG.brands[b.key]=CONFIG.brands[b.key]||{}; CONFIG.brands[b.key][field]=val; saveConfig(); applyBrand(); }
  adminOverlay.querySelector('#bName').addEventListener('input',e=>setB('name',e.target.value));
  adminOverlay.querySelector('#bTag').addEventListener('input',e=>setB('tag',e.target.value));
  adminOverlay.querySelector('#bCn').addEventListener('input',e=>setB('cn',e.target.value));
  adminOverlay.querySelector('#bCatch').addEventListener('input',e=>setB('catch',e.target.value));
  adminOverlay.querySelector('#cGold').addEventListener('input',e=>setB('gold',e.target.value));
  adminOverlay.querySelector('#cDeep').addEventListener('input',e=>setB('deep',e.target.value));
  adminOverlay.querySelector('#cSoft').addEventListener('input',e=>setB('soft',e.target.value));
}
function hex(c){ if(!c) return "#000000"; if(/^#([0-9a-f]{6})$/i.test(c)) return c; const m=/^#([0-9a-f]{3})$/i.exec(c); if(m){ return "#"+m[1].split('').map(x=>x+x).join(''); } return "#C2A268"; }

/* ---- data tab ---- */
function renderDataTab(body){
  body.innerHTML=`
    <div class="a-note">編集内容はこの端末のブラウザに保存されます。<b>公開サイト全員に反映するには、JSONを書き出して開発側に渡してください</b>（次回デプロイで全員に反映）。</div>
    <div class="sec-title" style="margin-top:0">設定を書き出す（エクスポート）</div>
    <textarea class="ta-mono" id="expArea" readonly>${htmlEsc(JSON.stringify(CONFIG,null,2))}</textarea>
    <div style="display:flex;gap:9px;margin-top:9px;flex-wrap:wrap">
      <button class="mini-btn gold" id="copyJson">コピー</button>
      <button class="mini-btn" id="dlJson">ファイルで保存</button>
    </div>
    <div class="sec-title">設定を読み込む（インポート）</div>
    <textarea class="ta-mono" id="impArea" placeholder="ここに設定JSONを貼り付け"></textarea>
    <div style="display:flex;gap:9px;margin-top:9px;flex-wrap:wrap">
      <button class="mini-btn gold" id="impBtn">読み込んで反映</button>
      <button class="mini-btn danger" id="resetAll">すべて初期化</button>
    </div>`;
  adminOverlay.querySelector('#copyJson').onclick=()=>{ const t=adminOverlay.querySelector('#expArea'); t.select(); try{ navigator.clipboard.writeText(t.value); }catch(_){ document.execCommand('copy'); } toast("JSONをコピーしました"); };
  adminOverlay.querySelector('#dlJson').onclick=()=>{ const blob=new Blob([JSON.stringify(CONFIG,null,2)],{type:"application/json"}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download="totonoune_config.json"; a.click(); URL.revokeObjectURL(a.href); };
  adminOverlay.querySelector('#impBtn').onclick=()=>{
    const raw=adminOverlay.querySelector('#impArea').value.trim(); if(!raw) return;
    let parsed; try{ parsed=JSON.parse(raw); }catch(e){ toast("JSONの形式が正しくありません"); return; }
    CONFIG = {
      content: deepMerge(clone(DEFAULT_CONTENT), parsed.content||{}),
      questions: (Array.isArray(parsed.questions)&&parsed.questions.length)? parsed.questions : clone(DEFAULT_Q),
      points: parsed.points||{}, earImages: Object.assign({right:null,left:null}, parsed.earImages||{}), brands: parsed.brands||{}
    };
    saveConfig(); applyConfigToRuntime(); applyBrand(); renderAdmin(); if(view!=="q") render(); toast("設定を読み込みました");
  };
  adminOverlay.querySelector('#resetAll').onclick=()=>{
    try{ localStorage.removeItem(CFG_KEY); }catch(_){}
    loadConfig(); applyConfigToRuntime(); applyBrand(); renderAdmin(); if(view!=="q") render(); toast("初期状態に戻しました");
  };
}

/* ===================== keyboard ===================== */
document.addEventListener('keydown',(e)=>{
  if(e.key==="Escape" && adminOverlay.classList.contains('open')) return closeAdmin();
  if(e.key==="Enter" && view==="q" && !adminOverlay.classList.contains('open') && !nextBtn.disabled){ nextBtn.click(); }
});

/* ===================== init ===================== */
loadConfig();
applyConfigToRuntime();
applyBrand();
render();
</script>
</body>
</html>
